<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailERP | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            --primary-hover: #0f766e;
            --bg-glass: rgba(255, 255, 255, 0.85);
            --border: rgba(226, 232, 240, 0.8);
            --text-main: #1e293b;
            --text-secondary: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #f1f5f9 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .signup-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-glass);
            backdrop-filter: blur(16px);
            border: 1px solid white;
            border-radius: 28px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header { text-align: center; margin-bottom: 2.5rem; }
        .logo-box {
            width: 64px; height: 64px; background: var(--primary);
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem; color: white; font-size: 1.5rem; font-weight: bold;
            box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.3);
        }

        h2 { font-family: 'Outfit', sans-serif; font-size: 1.75rem; color: var(--text-main); margin-bottom: 0.5rem; }
        p.subtitle { color: var(--text-secondary); font-size: 0.95rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); }
        input {
            width: 100%; padding: 0.875rem 1.25rem; border: 1.5px solid var(--border);
            border-radius: 12px; font-size: 1rem; transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1); }

        .btn-signup {
            width: 100%; padding: 1rem; background: var(--primary); color: white;
            border: none; border-radius: 14px; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif;
            margin-top: 1rem;
        }
        .btn-signup:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-signup:active { transform: translateY(0); }

        .footer { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-secondary); }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        
        .toast {
            position: fixed; top: 2rem; right: 2rem; padding: 1rem 2rem;
            border-radius: 12px; color: white; font-weight: 500; display: none;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="signup-container">
        <div class="header">
            <div class="logo-box">AI</div>
            <h2>Launch Your Business</h2>
            <p class="subtitle">Join the Odoo SaaS platform and automate your sales today.</p>
        </div>

        <form id="signupForm">
            <div class="form-group">
                <label>Business Name</label>
                <input type="text" id="businessName" placeholder="Acme Corporation" required>
            </div>
            <div class="form-group">
                <label>Owner Email</label>
                <input type="email" id="email" placeholder="owner@business.com" required>
            </div>
            <div class="form-group">
                <label>Create Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-signup">Start My Free Trial</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/static/login.html">Sign In</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signupForm');
        
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.textContent;
            btn.textContent = 'Creating Account...';
            btn.disabled = true;

            const payload = {
                business_name: document.getElementById('businessName').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok) {
                    showToast('Business Registered! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/static/login.html?new_tenant=' + result.tenant_id;
                    }, 2000);
                } else {
                    showToast(result.detail || 'Signup failed', 'error');
                }
            } catch (err) {
                showToast('Network error, please try again', 'error');
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
