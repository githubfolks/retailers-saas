<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailERP | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div id="root"></div>

    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const Toast = ({ message, type }) => (
            <div className={`toast ${type} animate-toast`}>
                <Icon name={type === 'success' ? 'check-circle' : 'alert-circle'} size={18} />
                <span>{message}</span>
            </div>
        );

        const MerchantLogin = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 3000);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const response = await axios.post('/auth/login', {
                        email: email,
                        password: password
                    });

                    const { access_token, tenant_id, role } = response.data;
                    localStorage.setItem('tenant_token', access_token);
                    localStorage.setItem('active_tenant', tenant_id);
                    localStorage.setItem('user_role', role);

                    showToast('Sign in successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/static/tenant.html';
                    }, 1000);
                } catch (err) {
                    if (err.response?.status === 429) {
                        showToast('Too many attempts. Please wait 60 seconds.', 'error');
                    } else {
                        showToast(err.response?.data?.detail || 'Invalid email or password.', 'error');
                    }
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-screen">
                    {toast && (
                        <div className="toast-container">
                            <Toast message={toast.message} type={toast.type} />
                        </div>
                    )}
                    <div className="login-card-v2 animate-scale">
                        <div className="login-header">
                            <div className="login-logo">
                                <div className="brand-icon" style={{ background: 'var(--primary-gradient)' }}>
                                    <Icon name="store" size={20} />
                                </div>
                                <div>
                                    <div className="brand-name" style={{ fontSize: '1.25rem' }}>RetailERP</div>
                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)', fontWeight: 600, letterSpacing: '0.05em' }}>MERCHANT PORTAL</div>
                                </div>
                            </div>
                            <h1 className="outfit">Welcome back</h1>
                            <p>Sign in to access your business dashboard</p>
                        </div>
                        <form className="login-form" onSubmit={handleLogin}>
                            <div className="form-group">
                                <label>Email Address</label>
                                <input
                                    type="email"
                                    placeholder="owner@yourbusiness.com"
                                    value={email}
                                    onChange={e => setEmail(e.target.value)}
                                    required
                                />
                            </div>
                            <div className="form-group">
                                <label>Password</label>
                                <input
                                    type="password"
                                    placeholder="Enter your password"
                                    value={password}
                                    onChange={e => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button type="submit" className="btn-primary" disabled={loading} style={{ width: '100%' }}>
                                {loading ? 'Signing in...' : 'Sign In'}
                                {!loading && <Icon name="arrow-right" size={18} />}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MerchantLogin />);
    </script>
</body>

</html>
