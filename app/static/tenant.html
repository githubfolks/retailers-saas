<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard | RetailERP</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="/static/dashboard.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@0.400.0"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #0d9488;
            --primary-light: rgba(13, 148, 136, 0.1);
            --accent: #0f766e;
            --bg-glass: rgba(13, 148, 136, 0.05);
        }
        .icon-wrapper svg {
            display: block;
            color: inherit;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Core React & Utilities -->
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- Components ---

        const BarcodeScanner = ({ onResult, onClose }) => {
            useEffect(() => {
                const scanner = new Html5QrcodeScanner("scanner-region", {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0
                });

                scanner.render((decodedText) => {
                    scanner.clear();
                    onResult(decodedText);
                }, (error) => {
                    // console.warn(error);
                });

                return () => {
                    scanner.clear().catch(err => console.error("Failed to clear scanner", err));
                };
            }, []);

            return (
                <div className="modal-overlay" style={{ zIndex: 3000 }}>
                    <div className="modal-content animate-pop" style={{ maxWidth: '440px' }}>
                        <div className="modal-header">
                            <h3 className="outfit">Scan Item SKU</h3>
                            <button className="btn-icon" onClick={onClose}><Icon name="x" size={20} /></button>
                        </div>
                        <div className="modal-body" style={{ textAlign: 'center' }}>
                            <div id="scanner-region" style={{ width: '100%', minHeight: '300px', background: '#000', borderRadius: '12px', overflow: 'hidden' }}></div>
                            <p style={{ marginTop: '1.25rem', fontSize: '0.875rem', color: 'var(--text-secondary)' }}>
                                Center the barcode within the frame to detect
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Icon System ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const [html, setHtml] = useState('');

            useEffect(() => {
                const generateIcon = () => {
                    if (!window.lucide) return;

                    // Lucide 0.400+ exports icons as PascalCase on window.lucide
                    const PascalName = name.split('-').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join('');
                    const camelName = name.split('-').map((s, i) => i > 0 ? s.charAt(0).toUpperCase() + s.slice(1) : s).join('');

                    try {
                        // Optional chaining avoids TypeError when .icons is undefined
                        const iconObj = window.lucide.icons?.[name] ||
                                        window.lucide.icons?.[camelName] ||
                                        window.lucide[PascalName];

                        if (iconObj && typeof iconObj.toSvg === 'function') {
                            setHtml(iconObj.toSvg({ width: size, height: size, 'stroke-width': 2, class: className }));
                            return;
                        }
                    } catch (e) { /* continue to fallback */ }

                    try {
                        // createIcons only works on document-attached elements
                        const wrapper = document.createElement('div');
                        wrapper.style.cssText = 'position:absolute;left:-9999px;visibility:hidden;pointer-events:none;';
                        const i = document.createElement('i');
                        i.setAttribute('data-lucide', name);
                        wrapper.appendChild(i);
                        document.body.appendChild(wrapper);
                        window.lucide.createIcons();
                        setHtml(wrapper.innerHTML);
                        document.body.removeChild(wrapper);
                    } catch (e) {
                        console.error('Lucide icon failed:', name, e);
                    }
                };

                generateIcon();

                if (!window.lucide) {
                    const checkInterval = setInterval(() => {
                        if (window.lucide) {
                            generateIcon();
                            clearInterval(checkInterval);
                        }
                    }, 50);
                    return () => clearInterval(checkInterval);
                }
            }, [name, size, className]);

            return <span 
                className={`icon-wrapper ${className}`}
                style={{ 
                    display: 'inline-flex', 
                    alignItems: 'center', 
                    justifyContent: 'center', 
                    width: size, 
                    height: size,
                    verticalAlign: 'middle',
                    lineHeight: 0
                }}
                dangerouslySetInnerHTML={{ __html: html }}
            />;
        };

        const Toast = ({ message, type }) => (
            <div className={`toast ${type} animate-toast`}>
                <Icon name={type === 'success' ? 'check-circle' : 'alert-circle'} size={18} />
                <span>{message}</span>
            </div>
        );

        const SidebarItem = ({ id, label, icon, active }) => (
            <a
                href={`#${id}`}
                className={`nav-item ${active ? 'active' : ''}`}
                style={{ textDecoration: 'none', color: 'inherit' }}
            >
                <Icon name={icon} size={20} />
                <span>{label}</span>
            </a>
        );

        const SettingsField = ({ label, type = "text", value, onChange, placeholder, hint }) => (
            <div className="form-group" style={{ marginBottom: '1.5rem' }}>
                <label style={{ display: 'block', marginBottom: '0.5rem', fontSize: '0.875rem', fontWeight: 600, color: 'var(--text-secondary)' }}>{label}</label>
                <input
                    type={type}
                    value={value || ''}
                    onChange={e => onChange(e.target.value)}
                    placeholder={placeholder}
                    style={{ width: '100%' }}
                />
                {hint && <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginTop: '0.25rem' }}>{hint}</div>}
            </div>
        );

        const StatCard = ({ label, value, icon, variant = "primary", index }) => (
            <div className={`stat-card animate-slide delay-${(index % 3) + 1}`}>
                <div className={`stat-icon ${variant}`}>
                    <Icon name={icon} size={24} />
                </div>
                <div className="stat-info">
                    <div className="label">{label}</div>
                    <div className="value">{value}</div>
                </div>
            </div>
        );


        // --- Context & Module System ---
        window.AppContext = React.createContext({});
        window.Pages = {};
        window.Shared = { Icon, StatCard, SettingsField, BarcodeScanner };

        const PageLoader = ({ currentPage }) => {
            const [, setTick] = React.useState(0);
            const [pageLoading, setPageLoading] = React.useState(false);

            React.useEffect(() => {
                if (window.Pages[currentPage]) return;
                setPageLoading(true);
                fetch('/static/pages/' + currentPage + '.js?v=' + Date.now())
                    .then(r => r.text())
                    .then(code => {
                        const transformed = Babel.transform(code, { presets: ['react'] }).code;
                        (0, eval)(transformed);
                        setTick(n => n + 1);
                    })
                    .catch(err => console.error('[PageLoader] Failed:', currentPage, err))
                    .finally(() => setPageLoading(false));
            }, [currentPage]);

            if (pageLoading) return (
                <div style={{ padding: '4rem', textAlign: 'center', color: 'var(--text-muted)' }}>
                    <div style={{ width: '36px', height: '36px', border: '3px solid var(--border)', borderTop: '3px solid var(--primary)', borderRadius: '50%', animation: 'spin 0.8s linear infinite', margin: '0 auto 1rem' }}></div>
                    <p style={{ fontSize: '0.875rem' }}>Loading module...</p>
                </div>
            );

            const PageComponent = window.Pages[currentPage];
            return PageComponent ? <PageComponent /> : null;
        };

        // --- Main App ---

        const MerchantDashboard = () => {
            const [token, setToken] = useState(localStorage.getItem('tenant_token') || '');
            const [tenantId, setTenantId] = useState(localStorage.getItem('active_tenant') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('user_role') || 'staff');
            const getHashPage = () => window.location.hash.replace('#', '') || 'overview';
            const [currentPage, setCurrentPage] = useState(getHashPage);

            useEffect(() => {
                const handleHashChange = () => setCurrentPage(getHashPage());
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);
            const [settings, setSettings] = useState({});
            const [summary, setSummary] = useState({ total_orders: 0, total_revenue: 0, pending_orders: 0, completed_orders: 0 });
            const [orders, setOrders] = useState([]);
            const [products, setProducts] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [financials, setFinancials] = useState(null);
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [alerts, setAlerts] = useState([]);
            const [forecasts, setForecasts] = useState([]);
            const [suggestions, setSuggestions] = useState([]);
            const [suppliers, setSuppliers] = useState([]);
            const [purchaseOrders, setPurchaseOrders] = useState([]);
            const [logisticsPartners, setLogisticsPartners] = useState([]);
            const [aiBriefing, setAiBriefing] = useState("");
            const [selectedOrder, setSelectedOrder] = useState(null);
            const [invoiceData, setInvoiceData] = useState(null);
            const [showInvoice, setShowInvoice] = useState(false);
            const [showScanner, setShowScanner] = useState(false);
            const [showCouponModal, setShowCouponModal] = useState(false);
            const [showFulfill, setShowFulfill] = useState(false);
            const [fulfillmentForm, setFulfillmentForm] = useState({ carrier: '', tracking: '' });
            const [loading, setLoading] = useState(false);
            const [toasts, setToasts] = useState([]);
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [returns, setReturns] = useState([]);
            const [showReturnModal, setShowReturnModal] = useState(false);
            const [selectedReturn, setSelectedReturn] = useState(null);
            const [returnForm, setReturnForm] = useState({ order_id: '', quantity: 1, reason: '', condition: 'resellable' });
            const [coupons, setCoupons] = useState([]);
            const [couponForm, setCouponForm] = useState({ code: '', discount_type: 'percentage', discount_value: 0, min_purchase_amount: 0 });

            const [categories, setCategories] = useState([]);
            const [brands, setBrands] = useState([]);
            const [units, setUnits] = useState([]);
            const [attributes, setAttributes] = React.useState([]);
            const [showCategoryModal, setShowCategoryModal] = useState(false);
            const [showBrandModal, setShowBrandModal] = useState(false);
            const [showUnitModal, setShowUnitModal] = useState(false);
            const [itemForm, setItemForm] = useState({}); // Generic form for masters

            const [showProductWizard, setShowProductWizard] = React.useState(false);
            const [wizardStep, setWizardStep] = React.useState(1);
            const [productForm, setProductForm] = useState({
                name: '', description: '', price: 0,
                category_id: '', brand_id: '', unit_id: '',
                selectedSizes: [], selectedColors: [], variants: [],
                image_urls: []
            });

            // WAREHOUSE & LOCATION STATE
            const [warehouses, setWarehouses] = React.useState([]);
            const [locations, setLocations] = React.useState([]);
            const [valuationLedger, setValuationLedger] = React.useState([]);
            const [showWarehouseModal, setShowWarehouseModal] = React.useState(false);
            const [showLocationModal, setShowLocationModal] = React.useState(false);
            const [warehouseForm, setWarehouseForm] = React.useState({ name: '', code: '', address: '', capacity: 1000 });
            const [locationForm, setLocationForm] = React.useState({ warehouse_id: '', name: '', parent_id: '', location_type: 'internal' });

            // SKU DETAIL PANEL STATE
            const [showSkuPanel, setShowSkuPanel] = React.useState(false);
            const [skuDetail, setSkuDetail] = React.useState(null);
            const [skuPlatforms, setSkuPlatforms] = React.useState([]);
            const [skuBarcodes, setSkuBarcodes] = React.useState([]);
            const [skuPanelLoading, setSkuPanelLoading] = React.useState(false);

            // POS STATE
            const [posCart, setPosCart] = React.useState([]);
            const [posSummary, setPosSummary] = React.useState({ today_sales: 0, today_order_count: 0, payment_breakdown: {}, top_items: [] });
            const [posSearchSearch, setPosSearch] = React.useState('');
            const [posPaymentMethod, setPosPaymentMethod] = React.useState('upi');
            const [posSelectedCustomer, setPosSelectedCustomer] = React.useState(null);
            const [posCategory, setPosCategory] = React.useState('All');
            const [lastOrder, setLastOrder] = React.useState(null);

            const showToast = useCallback((message, type = 'success') => {
                const id = Date.now() + Math.random();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            }, []);

            const API = useMemo(() => {
                const instance = axios.create({ baseURL: '' });
                instance.interceptors.request.use(config => {
                    const token = localStorage.getItem('tenant_token');
                    if (token) config.headers.Authorization = `Bearer ${token}`;
                    return config;
                });
                return instance;
            }, []);

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setLoading(true);
                const formData = new FormData();
                formData.append('file', file);

                try {
                    const res = await axios.post('/api/products/upload', formData, {
                        headers: {
                            'Content-Type': 'multipart/form-data',
                            'Authorization': `Bearer ${token}`
                        }
                    });
                    setProductForm(prev => ({
                        ...prev,
                        image_urls: [res.data.url] // Single image for now as primary
                    }));
                    showToast('Image uploaded successfully');
                } catch (err) {
                    console.error(err);
                    showToast('Failed to upload image', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const fetchData = useCallback(async () => {
                if (!token) return;
                setLoading(true);
                try {
                    const requests = [];
                    const handlers = [];

                    // Always fetch basic settings
                    requests.push(API.get('/api/settings'));
                    handlers.push(res => setSettings(res.data));

                    if (currentPage === 'overview') {
                        requests.push(API.get('/orders/summary'), API.get('/products/'), API.get('/orders/pos-summary'));
                        handlers.push(
                            res => setSummary(res.data),
                            res => setProducts(res.data),
                            res => setPosSummary(res.data)
                        );
                    } else if (currentPage === 'products') {
                        requests.push(API.get('/products/'), API.get('/attributes/'), API.get('/categories/'), API.get('/brands/'), API.get('/units/'));
                        handlers.push(
                            res => setProducts(res.data),
                            res => setAttributes(res.data),
                            res => setCategories(res.data),
                            res => setBrands(res.data),
                            res => setUnits(res.data)
                        );
                    } else if (currentPage === 'orders') {
                        requests.push(API.get('/orders/'), API.get('/procurement/logistics-partners'));
                        handlers.push(res => setOrders(res.data), res => setLogisticsPartners(res.data));
                    } else if (currentPage === 'pos') {
                        requests.push(API.get('/products/'), API.get('/orders/pos-summary'));
                        handlers.push(
                            res => setProducts(res.data),
                            res => setPosSummary(res.data)
                        );
                    } else if (currentPage === 'inventory') {
                        requests.push(API.get('/inventory/alerts'), API.get('/inventory/reorder-suggestions'));
                        handlers.push(
                            res => setAlerts(res.data),
                            res => setSuggestions(res.data)
                        );
                    } else if (currentPage === 'procurement') {
                        requests.push(API.get('/procurement/purchase-orders'), API.get('/procurement/suppliers'));
                        handlers.push(
                            res => setPurchaseOrders(res.data),
                            res => setSuppliers(res.data)
                        );
                    } else if (currentPage === 'analytics') {
                        requests.push(API.get('/analytics/comprehensive-report'));
                        handlers.push(res => setFinancials(res.data));
                    } else if (currentPage === 'customers') {
                        requests.push(API.get('/customers/'));
                        handlers.push(res => setCustomers(res.data));
                    } else if (currentPage === 'partners') {
                        requests.push(API.get('/procurement/suppliers'), API.get('/customers/'), API.get('/procurement/logistics-partners'));
                        handlers.push(
                            res => setSuppliers(res.data),
                            res => setCustomers(res.data),
                            res => setLogisticsPartners(res.data)
                        );
                    } else if (currentPage === 'coupons') {
                        requests.push(API.get('/coupons/'));
                        handlers.push(res => setCoupons(res.data));
                    } else if (currentPage === 'returns') {
                        requests.push(API.get('/returns/'));
                        handlers.push(res => setReturns(res.data));
                    } else if (currentPage === 'inventory-valuation') {
                        requests.push(API.get('/inventory/valuation/ledger'));
                        handlers.push(res => setValuationLedger(res.data));
                    } else if (currentPage === 'setup-warehouses') {
                        requests.push(API.get('/inventory/warehouses'));
                        handlers.push(res => setWarehouses(res.data));
                    } else if (currentPage === 'setup-locations') {
                        requests.push(API.get('/inventory/locations'));
                        handlers.push(res => setLocations(res.data));
                    } else if (currentPage === 'setup-categories') {
                        requests.push(API.get('/categories/'));
                        handlers.push(res => setCategories(res.data));
                    } else if (currentPage === 'setup-brands') {
                        requests.push(API.get('/brands/'));
                        handlers.push(res => setBrands(res.data));
                    } else if (currentPage === 'setup-units') {
                        requests.push(API.get('/units/'));
                        handlers.push(res => setUnits(res.data));
                    }

                    const responses = await Promise.all(requests);
                    responses.forEach((res, i) => handlers[i](res));
                } catch (err) {
                    console.error('Fetch Error:', err);
                    showToast('Data synchronization failed. Please check network.', 'error');
                } finally {
                    setLoading(false);
                }
            }, [token, currentPage, API]);

            const generateBriefing = async () => {
                setLoading(true);
                try {
                    const res = await API.get('/inventory/ai-briefing');
                    setAiBriefing(res.data.briefing);
                    showToast('AI analysis updated');
                } catch (err) {
                    showToast('AI analysis failed', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const fetchInvoice = async (orderId) => {
                setLoading(true);
                try {
                    const res = await API.get(`/orders/${orderId}/invoice`);
                    setInvoiceData(res.data);
                    setShowInvoice(true);
                } catch (err) {
                    showToast('Could not generate invoice', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const initiateFulfillment = (order) => {
                setSelectedOrder(order);
                setShowFulfill(true);
            };

            const submitFulfillment = async () => {
                setLoading(true);
                try {
                    await API.post(`/orders/${selectedOrder.id}/fulfill`, {
                        carrier_name: fulfillmentForm.carrier,
                        tracking_number: fulfillmentForm.tracking
                    });
                    showToast('Shipping status updated');
                    setShowFulfill(false);
                    fetchData();
                } catch (err) {
                    showToast('Fulfillment update failed', 'error');
                } finally {
                    setLoading(false);
                }
            };


            const handleCreateLocation = async () => {
                try {
                    setLoading(true);
                    await API.post('/inventory/locations', {
                        warehouse_id: parseInt(locationForm.warehouse_id),
                        name: locationForm.name,
                        parent_id: locationForm.parent_id ? parseInt(locationForm.parent_id) : null,
                        location_type: locationForm.location_type
                    });
                    showToast('Location created successfully');
                    setShowLocationModal(false);
                    fetchData();
                } catch (e) {
                    showToast('An error occurred. Please try again.', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const selectCustomer = async (customer) => {
                setLoading(true);
                try {
                    const res = await API.get(`/customers/${customer.id}`);
                    setSelectedCustomer(res.data);
                } catch (err) {
                    showToast('Failed to load customer details', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateCoupon = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await API.post('/coupons/', couponForm);
                    showToast('Coupon created successfully');
                    setShowCouponModal(false);
                    fetchData();
                } catch (err) {
                    showToast('Failed to create coupon', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleDeactivateCoupon = async (id) => {
                try {
                    await API.delete(`/coupons/${id}`);
                    fetchData();
                    showToast('Coupon deactivated');
                } catch (err) {
                    showToast('Action failed', 'error');
                }
            };

            useEffect(() => {
                fetchData();
            }, [fetchData]);

            const updateConfig = async () => {
                setLoading(true);
                try {
                    await API.patch('/api/settings', settings);
                    showToast('Configuration updated successfully');
                } catch (err) {
                    showToast('Failed to update settings', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleBulkUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const csvData = e.target.result;
                    setLoading(true);
                    try {
                        const res = await API.post('/products/bulk', csvData);
                        showToast(`Bulk upload completed: ${res.data.success_count} success, ${res.data.error_count} errors`);
                        fetchData();
                    } catch (err) {
                        showToast('Bulk upload failed', 'error');
                    } finally {
                        setLoading(false);
                    }
                };
                reader.readAsText(file);
            };

            const handleCreateReturn = async () => {
                setLoading(true);
                try {
                    await API.post('/returns/', returnForm);
                    showToast('Return recorded and stock adjusted');
                    setShowReturnModal(false);
                    fetchData();
                } catch (err) {
                    showToast(err.response?.data?.detail || 'Return failed', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleProcessRefund = async (returnId) => {
                setLoading(true);
                try {
                    await API.post('/returns/refund', { return_id: returnId });
                    showToast('Refund processed successfully');
                    fetchData();
                } catch (err) {
                    showToast('Refund failed', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleLogout = () => {
                localStorage.clear();
                window.location.href = '/static/login.html';
            };

            if (!token) {
                window.location.href = '/static/login.html';
                return null;
            }


            const contextValue = {
                token, tenantId, userRole, settings, setSettings,
                summary, orders, products, customers, financials,
                selectedCustomer, setSelectedCustomer,
                alerts, forecasts, suggestions, suppliers, purchaseOrders, logisticsPartners, setLogisticsPartners, aiBriefing,
                selectedOrder, setSelectedOrder, invoiceData, setInvoiceData,
                showInvoice, setShowInvoice, showScanner, setShowScanner,
                showCouponModal, setShowCouponModal, showFulfill, setShowFulfill,
                fulfillmentForm, setFulfillmentForm, loading, setLoading,
                returns, showReturnModal, setShowReturnModal, returnForm, setReturnForm,
                coupons, couponForm, setCouponForm,
                categories, brands, units, attributes,
                warehouses, locations, valuationLedger,
                showWarehouseModal, setShowWarehouseModal, showLocationModal, setShowLocationModal,
                warehouseForm, setWarehouseForm, locationForm, setLocationForm,
                showSkuPanel, setShowSkuPanel, skuDetail, setSkuDetail,
                skuPlatforms, setSkuPlatforms, skuBarcodes, setSkuBarcodes,
                skuPanelLoading, setSkuPanelLoading,

                                <div className="modal-footer">
                                    <button className="btn-secondary" onClick={() => setShowLocationModal(false)}>Cancel</button>
                                    <button className="btn-primary" onClick={handleCreateLocation} disabled={!locationForm.name || loading}>
                                        {loading ? 'Creating...' : 'Create Location'}
                                        <Icon name="check" size={18} />
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* SKU DETAIL PANEL */}
                    {showSkuPanel && (
                        <div className="modal-overlay" onClick={() => setShowSkuPanel(false)} style={{ alignItems: 'flex-start', justifyContent: 'flex-end', padding: 0 }}>
                            <div
                                className="animate-slide"
                                onClick={e => e.stopPropagation()}
                                style={{
                                    width: '480px',
                                    height: '100vh',
                                    background: 'var(--bg-card)',
                                    boxShadow: '-8px 0 40px rgba(0,0,0,0.15)',
                                    display: 'flex',
                                    flexDirection: 'column',
                                    overflow: 'hidden'
                                }}
                            >
                                {/* Panel Header */}
                                <div style={{ padding: '2rem', borderBottom: '1px solid var(--border)', background: 'linear-gradient(135deg, var(--primary), var(--accent))', color: 'white' }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                        <div>
                                            <div style={{ fontSize: '0.7rem', fontWeight: 800, letterSpacing: '0.15em', textTransform: 'uppercase', opacity: 0.8, marginBottom: '0.5rem' }}>SKU Details</div>
                                            <h3 style={{ margin: 0, fontSize: '1.5rem', fontFamily: 'Outfit, sans-serif' }}>{skuDetail?.sku || '—'}</h3>
                                            <div style={{ marginTop: '0.4rem', opacity: 0.9, fontSize: '0.875rem' }}>{skuDetail?.product_name}</div>
                                        </div>
                                        <button className="btn-icon" onClick={() => setShowSkuPanel(false)} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: 'white' }}>
                                            <Icon name="x" size={18} />
                                        </button>
                                    </div>
                                </div>

                                {skuPanelLoading ? (
                                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '1rem', color: 'var(--text-muted)' }}>
                                        <div style={{ width: '40px', height: '40px', border: '3px solid var(--border)', borderTop: '3px solid var(--primary)', borderRadius: '50%', animation: 'spin 0.8s linear infinite' }}></div>
                                        <span style={{ fontSize: '0.875rem' }}>Tracing SKU across platforms...</span>
                                    </div>
                                ) : (
                                    <div style={{ flex: 1, overflowY: 'auto', padding: '2rem', display: 'flex', flexDirection: 'column', gap: '2rem' }}>

                                        {/* Stock Overview */}
                                        <div>
                                            <div style={{ fontSize: '0.7rem', fontWeight: 800, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                <Icon name="package" size={14} />
                                                Stock Overview
                                            </div>
                                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem' }}>
                                                <div style={{ padding: '1.25rem', background: 'var(--bg-main)', borderRadius: '14px', border: '1px solid var(--border)' }}>
                                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Total Stock</div>
                                                    <div style={{ fontSize: '2rem', fontWeight: 800, color: 'var(--text-primary)', fontFamily: 'Outfit, sans-serif' }}>{skuDetail?.total_stock ?? '—'}</div>
                                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>units across all locations</div>
                                                </div>
                                                <div style={{ padding: '1.25rem', background: 'var(--bg-main)', borderRadius: '14px', border: '1px solid var(--border)' }}>
                                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', marginBottom: '0.5rem' }}>Available</div>
                                                    <div style={{ fontSize: '2rem', fontWeight: 800, color: skuDetail?.available_stock > 0 ? 'var(--success)' : 'var(--secondary)', fontFamily: 'Outfit, sans-serif' }}>{skuDetail?.available_stock ?? '—'}</div>
                                                    <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)' }}>unallocated units</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Platform Sync Status */}
                                        <div>
                                            <div style={{ fontSize: '0.7rem', fontWeight: 800, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                <Icon name="globe" size={14} />
                                                Platform Sync Status
                                            </div>
                                            {skuPlatforms.length === 0 ? (
                                                <div style={{ padding: '2rem', textAlign: 'center', background: 'var(--bg-main)', borderRadius: '14px', border: '1px dashed var(--border)', color: 'var(--text-muted)', fontSize: '0.875rem' }}>
                                                    <Icon name="cloud-off" size={28} style={{ opacity: 0.4, marginBottom: '0.75rem' }} />
                                                    <p style={{ margin: 0 }}>No external platforms mapped.<br/>Internal only.</p>
                                                </div>
                                            ) : (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                                                    {skuPlatforms.map((pm, i) => {
                                                        const iconMap = { shopify: 'shopping-bag', amazon: 'package', woocommerce: 'globe' };
                                                        const isSync = pm.sync_status === 'synced';
                                                        return (
                                                            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '1rem', padding: '1rem 1.25rem', background: 'var(--bg-main)', borderRadius: '12px', border: '1px solid var(--border)' }}>
                                                                <div style={{ width: '40px', height: '40px', borderRadius: '10px', background: isSync ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: isSync ? 'var(--success)' : 'var(--secondary)', flexShrink: 0 }}>
                                                                    <Icon name={iconMap[pm.platform_name] || 'link'} size={18} />
                                                                </div>
                                                                <div style={{ flex: 1, minWidth: 0 }}>
                                                                    <div style={{ fontWeight: 700, textTransform: 'capitalize', fontSize: '0.9rem' }}>{pm.platform_name}</div>
                                                                    <div style={{ fontSize: '0.75rem', color: 'var(--text-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>ID: {pm.platform_product_id}</div>
                                                                </div>
                                                                <div style={{ textAlign: 'right', flexShrink: 0 }}>
                                                                    <div style={{ display: 'inline-flex', alignItems: 'center', gap: '0.3rem', padding: '0.2rem 0.6rem', borderRadius: '999px', fontSize: '0.7rem', fontWeight: 700, background: isSync ? 'var(--success)' : '#ef4444', color: 'white' }}>
                                                                        <div style={{ width: '5px', height: '5px', borderRadius: '50%', background: 'rgba(255,255,255,0.7)' }}></div>
                                                                        {pm.sync_status.toUpperCase()}
                                                                    </div>
                                                                    <div style={{ fontSize: '0.65rem', color: 'var(--text-muted)', marginTop: '0.3rem' }}>
                                                                        {pm.last_synced ? new Date(pm.last_synced).toLocaleString('en-IN', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'Never synced'}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>

                                        {/* Platform Summary from lookup */}
                                        {skuDetail?.platforms && Object.keys(skuDetail.platforms).length > 0 && (
                                            <div>
                                                <div style={{ fontSize: '0.7rem', fontWeight: 800, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                    <Icon name="link" size={14} />
                                                    Raw Platform IDs
                                                </div>
                                                <div style={{ background: 'var(--bg-main)', borderRadius: '12px', border: '1px solid var(--border)', overflow: 'hidden' }}>
                                                    {Object.entries(skuDetail.platforms).map(([platform, id], i) => (
                                                        <div key={platform} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.875rem 1.25rem', borderBottom: i < Object.entries(skuDetail.platforms).length - 1 ? '1px solid var(--border)' : 'none' }}>
                                                            <span style={{ textTransform: 'capitalize', fontWeight: 600, color: 'var(--text-secondary)', fontSize: '0.875rem' }}>{platform}</span>
                                                            <code style={{ fontSize: '0.75rem', background: 'var(--bg-glass)', padding: '0.2rem 0.5rem', borderRadius: '6px', color: 'var(--primary)', fontFamily: 'monospace' }}>{id}</code>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Barcodes */}
                                        <div>
                                            <div style={{ fontSize: '0.7rem', fontWeight: 800, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                                <Icon name="barcode" size={14} />
                                                Registered Barcodes
                                                <span style={{ marginLeft: 'auto', padding: '0.1rem 0.5rem', background: 'var(--primary)', color: 'white', borderRadius: '999px', fontSize: '0.65rem', fontWeight: 700 }}>{skuBarcodes.length}</span>
                                            </div>
                                            {skuBarcodes.length === 0 ? (
                                                <div style={{ padding: '1.5rem', textAlign: 'center', background: 'var(--bg-main)', borderRadius: '14px', border: '1px dashed var(--border)', color: 'var(--text-muted)', fontSize: '0.875rem' }}>
                                                    No barcodes registered for this SKU.
                                                </div>
                                            ) : (
                                                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem' }}>
                                                    {skuBarcodes.map((bc, i) => (
                                                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '1rem', padding: '0.875rem 1.25rem', background: 'var(--bg-main)', borderRadius: '10px', border: '1px solid var(--border)' }}>
                                                            <Icon name="barcode" size={18} style={{ color: 'var(--text-muted)', flexShrink: 0 }} />
                                                            <div style={{ flex: 1 }}>
                                                                <code style={{ fontFamily: 'monospace', fontWeight: 700, fontSize: '0.9rem' }}>{bc.barcode}</code>
                                                                <div style={{ fontSize: '0.7rem', color: 'var(--text-muted)', marginTop: '0.15rem' }}>{bc.barcode_type} · Scanned {bc.scanned_count}×</div>
                                                            </div>
                                                            {bc.is_primary && <span style={{ padding: '0.15rem 0.5rem', background: 'var(--primary)', color: 'white', borderRadius: '999px', fontSize: '0.65rem', fontWeight: 700 }}>PRIMARY</span>}
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                    </div>
                                )}

                                {/* Panel Footer */}
                                <div style={{ padding: '1.25rem 2rem', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end' }}>
                                    <button className="btn-secondary" onClick={() => setShowSkuPanel(false)}>Close Panel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
                </AppCtx.Provider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MerchantDashboard />);
    </script>
</body>

</html>
